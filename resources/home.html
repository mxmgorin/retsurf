<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>retsurf</title>
<style>
  /* ---- tokens (dark) ---- */
  :root {
    color-scheme: dark;
    --bg:      #16171A;
    --surface: #1E2024;
    --border:  #2A2D33;
    --ink:     #ECECEA;
    --muted:   #8A8F98;
    --accent:  #3FB8A0;
    --radius:  12px;
    --field:   min(620px, 90vw);
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 48px;
  }

  /* ---- wordmark ---- */
  .mark {
    font-size: 12px;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    user-select: none;
  }

  /* ---- search field (the hero) ---- */
  .search {
    width: var(--field);
    position: relative;
  }
  .search input {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--ink);
    font-family: inherit;
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 400;
    padding: 10px 4px 14px;
    border-bottom: 1px solid var(--border);
  }
  .search input::placeholder { color: var(--muted); }
  /* hairline accent that wipes in on focus */
  .search .rule {
    position: absolute;
    left: 0; bottom: 0;
    height: 2px;
    width: 100%;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform .28s cubic-bezier(.2,.7,.2,1);
  }
  .search input:focus ~ .rule { transform: scaleX(1); }

  /* ---- speed dial ---- */
  .dial {
    width: var(--field);
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(78px, 1fr));
    gap: 14px;
  }
  .tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--muted);
    padding: 4px;
    border-radius: var(--radius);
    transition: color .15s ease;
  }
  .tile .glyph {
    width: 56px; height: 56px;
    display: grid;
    place-items: center;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    font-size: 22px;
    font-weight: 600;
    color: var(--ink);
    transition: border-color .15s ease, transform .15s ease;
  }
  .tile .label {
    font-size: 12px;
    max-width: 100%;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tile:hover .glyph,
  .tile:focus .glyph,
  .tile:focus-visible .glyph {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .tile:hover, .tile:focus, .tile:focus-visible { color: var(--ink); }
  .tile:focus, .tile:focus-visible { outline: none; }
  .tile:focus .glyph,
  .tile:focus-visible .glyph {
    box-shadow: 0 0 0 2px var(--accent);
  }

  @media (prefers-reduced-motion: reduce) {
    .search .rule { transition: none; }
    .tile .glyph { transition: border-color .15s ease; }
    .tile:hover .glyph, .tile:focus-visible .glyph { transform: none; }
  }
</style>
</head>
<body>
  <div class="mark">retsurf</div>

  <form class="search" id="search" autocomplete="off">
    <input id="q" type="text" placeholder="Search or enter address" aria-label="Search or enter address" autofocus spellcheck="false">
    <span class="rule" aria-hidden="true"></span>
  </form>

  <nav class="dial" id="dial" aria-label="Top sites"></nav>

<!-- retsurf injects window.__NEWTAB__ (search template + saved bookmarks) here -->
__CONFIG__
<script>
(function () {
  // --- config the embedder can override ---
  // Set window.__NEWTAB__ = { sites:[{name,url}], search:"https://..%s" } before load.
  var cfg = window.__NEWTAB__ || {};
  var SEARCH = cfg.search || "https://duckduckgo.com/?q=%s";

  // Sample data — replace by injecting real top sites from your browser layer.
  var sites = cfg.sites || [
    { name: "Servo",   url: "https://servo.org" },
    { name: "GitHub",  url: "https://github.com" },
    { name: "Wikipedia", url: "https://wikipedia.org" },
    { name: "Hacker News", url: "https://news.ycombinator.com" },
    { name: "Rust",    url: "https://rust-lang.org" }
  ];

  // --- speed dial ---
  var dial = document.getElementById("dial");
  sites.forEach(function (s) {
    var a = document.createElement("a");
    a.className = "tile";
    a.href = s.url;
    var g = document.createElement("span");
    g.className = "glyph";
    g.textContent = (s.name || s.url).trim().charAt(0).toUpperCase();
    var l = document.createElement("span");
    l.className = "label";
    l.textContent = s.name || s.url;
    a.appendChild(g); a.appendChild(l);
    dial.appendChild(a);
  });

  // --- URL-vs-search routing ---
  function looksLikeUrl(t) {
    if (/\s/.test(t)) return false;                 // has spaces -> search
    if (/^[a-z][a-z0-9+.-]*:\/\//i.test(t)) return true;  // explicit scheme
    if (/^(localhost|[\d.]+)(:\d+)?(\/|$)/i.test(t)) return true; // ip/localhost
    return /^[^\s]+\.[^\s]{2,}/.test(t);             // domain.tld
  }
  function navigate(t) {
    t = t.trim();
    if (!t) return;
    var dest = looksLikeUrl(t)
      ? (/:\/\//.test(t) ? t : "https://" + t)
      : SEARCH.replace("%s", encodeURIComponent(t));
    window.location.href = dest;
  }

  document.getElementById("search").addEventListener("submit", function (e) {
    e.preventDefault();
    navigate(document.getElementById("q").value);
  });

  // --- directional focus navigation (arrows / D-pad) ---
  // The search box and every tile are focusable; arrows move focus to the
  // nearest element in that direction so the page is steerable without a
  // pointer. Left/Right inside the search box keep moving the text caret.
  var input = document.getElementById("q");
  function focusables() {
    return [input].concat([].slice.call(document.querySelectorAll(".tile")));
  }
  function moveFocus(dir) {
    var els = focusables();
    var cur = document.activeElement;
    if (els.indexOf(cur) === -1) { els[0].focus(); return; }
    var r = cur.getBoundingClientRect();
    var cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    var best = null, bestScore = Infinity;
    els.forEach(function (el) {
      if (el === cur) return;
      var b = el.getBoundingClientRect();
      var dx = (b.left + b.width / 2) - cx, dy = (b.top + b.height / 2) - cy;
      var ahead = dir === "left" ? dx < -1 : dir === "right" ? dx > 1
        : dir === "up" ? dy < -1 : dy > 1;
      if (!ahead) return;
      var horiz = dir === "left" || dir === "right";
      // distance along the travel axis, plus a penalty for drifting off it
      var score = (horiz ? Math.abs(dx) : Math.abs(dy))
        + (horiz ? Math.abs(dy) : Math.abs(dx)) * 2;
      if (score < bestScore) { bestScore = score; best = el; }
    });
    if (best) best.focus();
  }
  document.addEventListener("keydown", function (e) {
    var dir = { ArrowLeft: "left", ArrowRight: "right", ArrowUp: "up", ArrowDown: "down" }[e.key];
    if (!dir) {
      // Enter on a focused tile follows it (covers engines that don't
      // activate links on Enter natively); the search box has its own submit.
      if (e.key === "Enter" && document.activeElement &&
          document.activeElement.classList.contains("tile")) {
        navigate(document.activeElement.getAttribute("href"));
        e.preventDefault();
      }
      return;
    }
    // In the search box, Left/Right belong to the caret; only Down leaves it.
    if (document.activeElement === input && dir !== "down") return;
    moveFocus(dir);
    e.preventDefault();
  });
})();
</script>
</body>
</html>
