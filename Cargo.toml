[package]
name = "retsurf"
version = "0.1.0"
edition = "2021"
authors = ["troidem <mxmgorin@gmail.com>"]

[features]
default = []
sdl2-bundled = ["sdl2/bundled"]
sdl2-static-link = ["sdl2/static-link"]

[dependencies]
rust-embed="8.7.2"
rustls = {version = "0.23.32", features = ["ring"] }
sdl2 = { version = "0.38.0", default-features = false, features = ["raw-window-handle"] }
raw-window-handle = "0.6.2"
log = "0.4.28"
env_logger = "0.11.8"
libservo = { git = "https://github.com/mxmgorin/servo" }
dpi = "0.1.2"
url = "2.5.7"
keyboard-types = "0.8.1"
egui = "0.32.3"
glow = "0.16.0"
egui_glow = "0.32.3"
sdl2-keyboard-types = { git = "https://github.com/mxmgorin/sdl2-keyboard-types", tag = "0.1.0" }
