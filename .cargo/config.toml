# Style threads recurse per DOM-tree depth; stylo's default 512 KB stack
# overflows on deeply nested pages ("StyleThread#N has overflowed its stack").
# stylo reads this at compile time (option_env! in stylo/parallel.rs).
[env]
SERVO_STYLE_THREAD_STACK_SIZE_KB = "2048"

# Android link fixes, scoped to the cross-compile target so desktop builds are
# untouched. Paths are relative to the repo root (cargo's rustc cwd):
#  - NDK r23+ dropped libgcc but rustc's aarch64-linux-android spec still emits
#    `-lgcc`; android/scripts/build.sh writes target/ndk-libgcc-stub/libgcc.a
#    = `INPUT(-lunwind)` to satisfy it.
#  - jniLibs holds the bundled libSDL2.so the linker needs for `-lSDL2`.
# Kept here rather than in RUSTFLAGS so iterative builds don't recompile the world
# (a changing RUSTFLAGS invalidates every crate; a stable config entry does not).
[target.aarch64-linux-android]
rustflags = ["-L", "target/ndk-libgcc-stub", "-L", "android/app/src/main/jniLibs/arm64-v8a"]
