name: Windows & macOS

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: retsurf-windows-x86_64
            binary: retsurf.exe
          - os: macos-latest # arm64 (Apple silicon)
            artifact: retsurf-macos-aarch64
            binary: retsurf
    runs-on: ${{ matrix.os }}
    steps:
      # Servo's dependency tree nests deep enough to blow past MAX_PATH.
      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - uses: actions/checkout@v4

      # cmake builds the bundled SDL2; pkg-config resolves the rest. Both are
      # usually preinstalled on the runner images — this pins the assumption.
      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake pkg-config

      - name: Rust toolchain
        run: |
          rustup show
          rustc --version

      # SDL2 is built from source and linked statically (the runners ship no
      # system SDL2, and a desktop user shouldn't need one either). SpiderMonkey
      # comes as mozjs' prebuilt archive for these targets (jit+intl on, so the
      # build script downloads instead of compiling). Default features stay on:
      # desktop GL has working surfman, so webgl keeps its connection probe.
      - name: Build
        run: cargo build --release --features sdl2-bundled,sdl2-static-link

      - name: Stage binary
        shell: bash
        run: |
          set -eux
          mkdir -p dist
          cp "target/release/${{ matrix.binary }}" dist/
          if [ "${{ runner.os }}" = "macOS" ]; then strip -x "dist/${{ matrix.binary }}" || true; fi
          ls -la dist/

      # Upload the raw binary; upload-artifact archives it into a single zip.
      # (Pre-zipping here would produce a zip-inside-a-zip on download.)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.binary }}

      - name: Zip for release
        if: github.event_name == 'release'
        shell: bash
        run: |
          set -eux
          cd dist
          if command -v 7z >/dev/null 2>&1; then
            7z a "../${{ matrix.artifact }}.zip" .
          else
            zip -r "../${{ matrix.artifact }}.zip" .
          fi

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.zip
