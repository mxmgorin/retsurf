name: Linux ARM

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-arm:
    # Native arm64 runner (free for public repos) — no cross-compile, no qemu.
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Diagnostics
        run: |
          set -eux
          uname -m
          ldd --version | head -1
          nproc
          free -h || true
          df -h /

      - name: Install Servo build dependencies
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang cmake curl git gperf pkg-config \
            python3 python3-pip ca-certificates \
            libssl-dev libdbus-1-dev libfreetype6-dev libglib2.0-dev \
            libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev \
            libharfbuzz-dev liblzma-dev libudev-dev libunwind-dev \
            libsdl2-dev zip

      - name: Rust toolchain
        run: |
          set -eux
          # rust-toolchain.toml pins the channel; rustup (preinstalled) honors it.
          rustup show
          rustc --version

      - name: Build
        env:
          # Tune for the target handheld cores: Cortex-A35 (RK3326), A53 (H700),
          # A55 (RK3566). cortex-a53 is the safe common denominator — all three
          # are ARMv8.0 with fp/neon/crc, and crypto (optional on A53) stays off,
          # so the binary runs on every target while getting in-order scheduling.
          RUSTFLAGS: "-C target-cpu=cortex-a53"
        run: |
          set -eux
          # --no-default-features drops `webgl`: surfman can't init on EGL 1.4 Mali
          # blobs and the connection is unused there, so the probe is skipped entirely.
          cargo build --release --no-default-features
          df -h /

      - name: Stage binary
        run: |
          set -eux
          mkdir -p dist
          cp target/release/retsurf dist/
          strip dist/retsurf || true
          ls -la dist/

      # Upload the raw binary; upload-artifact archives it into a single zip.
      # (Pre-zipping here would produce a zip-inside-a-zip on download.)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: retsurf-linux-aarch64
          path: dist/retsurf

      - name: Zip for release
        if: github.event_name == 'release'
        run: cd dist && zip -r ../retsurf-linux-aarch64.zip .

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: retsurf-linux-aarch64.zip
