name: Linux ARM

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-arm:
    # Native arm64 runner (free for public repos) — no cross-compile, no qemu.
    # One job per target core; they run in parallel on separate runners, so the
    # 3× Servo compile is ~1× wall-clock. A pure codegen flag (RUSTFLAGS) — the
    # Graviton runner happily emits code for older cores it doesn't itself run.
    runs-on: ubuntu-22.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          # ARMv8.0-A, in-order. RK3326. Runs on A53 too (same ISA).
          - cpu: cortex-a35
            suffix: a35
          # ARMv8.0-A, in-order, crypto OFF (optional on A53; H700/A133 may lack
          # it). Safe v8.0 baseline + default fallback. H700, Allwinner A133 Plus.
          - cpu: cortex-a53
            suffix: a53
          # ARMv8.2-A: LSE atomics, fp16, dotprod + crypto (present on these
          # chips). SIGILLs on the v8.0 cores above — must stay a separate binary.
          # RK3566, Allwinner A523 (T527 family).
          - cpu: cortex-a55
            suffix: a55
    steps:
      - uses: actions/checkout@v4

      - name: Diagnostics
        run: |
          set -eux
          uname -m
          ldd --version | head -1
          nproc
          free -h || true
          df -h /

      - name: Install Servo build dependencies
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang cmake curl git gperf pkg-config \
            python3 python3-pip ca-certificates \
            libssl-dev libdbus-1-dev libfreetype6-dev libglib2.0-dev \
            libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev \
            libharfbuzz-dev liblzma-dev libudev-dev libunwind-dev \
            libsdl2-dev zip

      - name: Rust toolchain
        run: |
          set -eux
          # rust-toolchain.toml pins the channel; rustup (preinstalled) honors it.
          rustup show
          rustc --version

      - name: Build
        env:
          RUSTFLAGS: "-C target-cpu=${{ matrix.cpu }}"
          # CI performance build (kept out of Cargo.toml so local `cargo build
          # --release` stays fast): whole-program fat LTO across the huge Servo
          # graph + a single codegen unit.
          CARGO_PROFILE_RELEASE_LTO: "fat"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          # panic=abort: webgl is off here (--no-default-features) so the only
          # catch_unwind in our code (the surfman probe) is gone — drop unwind
          # tables for a smaller, tighter binary. Trade-off: a panic in a Servo
          # worker/layout thread now aborts the process instead of unwinding it;
          # the RETSURF_PANIC_FILE hook (src/lib.rs) still runs first, so it's
          # logged. Desktop/Android keep unwind (webgl on → probe is compiled).
          CARGO_PROFILE_RELEASE_PANIC: "abort"
        run: |
          set -eux
          # --no-default-features drops `webgl`: surfman can't init on EGL 1.4 Mali
          # blobs and the connection is unused there, so the probe is skipped entirely.
          cargo build --release --no-default-features
          df -h /

      - name: Stage binary
        run: |
          set -eux
          mkdir -p dist
          cp target/release/retsurf "dist/retsurf.${{ matrix.suffix }}"
          strip "dist/retsurf.${{ matrix.suffix }}" || true
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: retsurf-${{ matrix.suffix }}
          path: dist/retsurf.${{ matrix.suffix }}

  package:
    # Collect all three per-core binaries into one PortMaster port; Retsurf.sh
    # picks the right one at runtime from /proc/cpuinfo.
    needs: build-arm
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Download per-core binaries
        uses: actions/download-artifact@v4
        with:
          pattern: retsurf-a*
          path: bins
          merge-multiple: true

      - name: Package for PortMaster
        run: |
          set -eux
          pm=portmaster-dist
          rm -rf "$pm"
          mkdir -p "$pm/retsurf"
          cp portmaster/Retsurf.sh "$pm/"
          # Bring over any bundled gamedir assets, minus the .gitkeep placeholder.
          cp -r portmaster/retsurf/. "$pm/retsurf/"
          rm -f "$pm/retsurf/.gitkeep"
          # All three optimized variants; Retsurf.sh execs the matching one.
          cp bins/retsurf.a35 bins/retsurf.a53 bins/retsurf.a55 "$pm/retsurf/"
          chmod +x "$pm/Retsurf.sh" "$pm/retsurf/retsurf.a35" \
            "$pm/retsurf/retsurf.a53" "$pm/retsurf/retsurf.a55"
          ls -laR "$pm"

      - name: Upload PortMaster artifact
        uses: actions/upload-artifact@v4
        with:
          name: retsurf-portmaster
          path: portmaster-dist

      - name: Zip for release
        if: github.event_name == 'release'
        run: |
          set -eux
          cd portmaster-dist && zip -r ../retsurf-portmaster.zip .

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            retsurf-portmaster.zip

  build-universal:
    # A single generic aarch64 binary for non-PortMaster installs: no -C
    # target-cpu (runs on any ARMv8.0+ core), default features (webgl ON, like
    # the desktop builds — the surfman probe falls back gracefully on EGL 1.4),
    # so panic stays `unwind` (the probe needs catch_unwind). Still a CI
    # performance build (fat LTO + one codegen unit). A dedicated build, not the
    # a53 reuse, so it isn't tied to any specific core's tuning. Independent of
    # the per-core matrix above, so it runs in parallel.
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Servo build dependencies
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang cmake curl git gperf pkg-config \
            python3 python3-pip ca-certificates \
            libssl-dev libdbus-1-dev libfreetype6-dev libglib2.0-dev \
            libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev \
            libharfbuzz-dev liblzma-dev libudev-dev libunwind-dev \
            libsdl2-dev zip

      - name: Rust toolchain
        run: |
          set -eux
          rustup show
          rustc --version

      - name: Build
        env:
          # CI performance build; no target-cpu so the binary runs on any aarch64.
          CARGO_PROFILE_RELEASE_LTO: "fat"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
        run: |
          set -eux
          # Default features (webgl ON) + panic=unwind (the default), so the
          # surfman probe's catch_unwind works on EGL 1.4 devices.
          cargo build --release
          df -h /

      - name: Stage binary
        run: |
          set -eux
          mkdir -p dist
          cp target/release/retsurf dist/retsurf-linux-aarch64
          strip dist/retsurf-linux-aarch64 || true
          ls -la dist/

      - name: Upload universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: retsurf-linux-aarch64
          path: dist/retsurf-linux-aarch64

      - name: Zip for release
        if: github.event_name == 'release'
        run: |
          set -eux
          cd dist && zip ../retsurf-linux-aarch64.zip retsurf-linux-aarch64

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            retsurf-linux-aarch64.zip
